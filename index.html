<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SprunkedR - Phase 1</title>
    <style>
        body {
            background: #0a0a0a;
            color: #ffaa00;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        h1 { margin-top: 20px; letter-spacing: 5px; text-shadow: 0 0 10px orange; }

        #stage {
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 40px;
            position: relative;
            border-bottom: 2px solid #333;
        }

        .character {
            width: 128px;
            height: 128px;
            image-rendering: pixelated;
            background-repeat: no-repeat;
            position: absolute;
        }

        #polo-player {
            background-image: url('assets/Images/Polo.png');
            background-size: contain;
            background-position: center;
        }

        #oren-player {
            background-image: url('assets/Images/Oren.png');
            background-size: 640px 128px; /* 5 frames x 128px */
            display: none;
        }

        /* The Draggable Icon Tray */
        #tray {
            position: absolute;
            bottom: 20px;
            width: 100%;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #oren-icon {
            width: 64px;
            height: 64px;
            background-image: url('assets/Images/Ori.png.png');
            background-size: contain;
            background-repeat: no-repeat;
            position: absolute;
            cursor: grab;
            z-index: 100;
            image-rendering: pixelated;
        }

        #oren-icon:active { cursor: grabbing; }

        .hint { font-size: 12px; color: #444; margin-top: 150px; }
    </style>
</head>
<body>

    <h1>SPRUNKED_R</h1>

    <div id="stage">
        <div id="polo-player" class="character"></div>
        <div id="oren-player" class="character"></div>
    </div>

    <div id="tray">
        <div id="oren-icon"></div>
    </div>

    <p class="hint">DRAG ORI ONTO THE POLO</p>

    <script src="App.js"></script>
</body>
</html>
