<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SprunkedR - 7 Polos</title>
    <style>
        body {
            background: #0a0a0a;
            color: #ffaa00;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        #stage {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 10px;
            width: 90%;
            height: 300px;
            margin-top: 50px;
            border-bottom: 3px solid #222;
        }

        .character-slot {
            width: 128px;
            height: 128px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .character {
            width: 128px;
            height: 128px;
            image-rendering: pixelated;
            background-repeat: no-repeat;
            background-size: contain;
            position: absolute;
        }

        /* All Polos use the same Polo.png */
        .polo { background-image: url('assets/Images/Polo.png'); }

        /* Oren's spritesheet (matched to Polo size) */
        #oren-player {
            background-image: url('assets/Images/Oren.png');
            background-size: 640px 128px;
            display: none;
        }

        #tray {
            margin-top: 50px;
            width: 100%;
            height: 100px;
            display: flex;
            justify-content: center;
        }

        #oren-icon {
            width: 64px;
            height: 64px;
            background-image: url('assets/Images/Ori.png.png');
            background-size: contain;
            background-repeat: no-repeat;
            position: absolute;
            cursor: grab;
            image-rendering: pixelated;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <h1>SPRUNKED_R</h1>

    <div id="stage">
        <div class="character-slot" id="slot-1"><div class="character polo"></div></div>
        <div class="character-slot" id="slot-2"><div class="character polo"></div></div>
        <div class="character-slot" id="slot-3"><div class="character polo"></div></div>
        <div class="character-slot" id="slot-4"><div class="character polo"></div></div>
        <div class="character-slot" id="slot-5"><div class="character polo"></div></div>
        <div class="character-slot" id="slot-6"><div class="character polo"></div></div>
        <div class="character-slot" id="slot-7"><div class="character polo"></div></div>
        
        <div id="oren-player" class="character"></div>
    </div>

    <div id="tray">
        <div id="oren-icon"></div>
    </div>

    <script src="App.js"></script>
</body>
</html>
